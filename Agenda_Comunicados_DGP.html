<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda de Comunicados — DGP | Expresso Nepomuceno</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --en-blue:#003A70; --en-orange:#F47920; --en-orange-hover:#d96b10;
    --en-blue-light:#E6EEF5; --bg:#f4f6f9; --card:#ffffff;
    --border:#dde3ea; --text:#1a2535; --text-muted:#5a6a7e; --text-light:#8a9ab0;
    --danger:#E24B4A; --danger-bg:rgba(226,75,74,0.07); --danger-border:rgba(226,75,74,0.3);
    --radius:10px; --radius-sm:6px;
  }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .site-header { background:var(--en-blue); position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(0,58,112,0.25); }
  .header-inner { max-width:1100px; margin:0 auto; padding:0 1.5rem; display:flex; align-items:stretch; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
  .logo-block { display:flex; flex-direction:column; justify-content:center; padding:0.85rem 1.25rem 0.85rem 0; border-right:1px solid rgba(255,255,255,0.12); }
  .logo-expresso { font-size:8px; font-weight:800; letter-spacing:3.5px; color:#fff; text-transform:uppercase; line-height:1; }
  .logo-nepomuceno { font-size:15px; font-weight:800; letter-spacing:0.5px; color:#fff; line-height:1; margin-top:2px; }
  .logo-bar { height:3px; background:var(--en-orange); border-radius:2px; margin-top:4px; }
  .header-title-block { flex:1; display:flex; flex-direction:column; justify-content:center; padding:0.85rem 0; }
  .header-title { font-size:15px; font-weight:600; color:#fff; }
  .header-sub { font-size:11px; color:rgba(255,255,255,0.5); margin-top:2px; }
  .header-nav { display:flex; align-items:center; gap:8px; padding:0.85rem 0; }
  .month-label { font-size:13px; font-weight:600; color:#fff; min-width:150px; text-align:center; }
  .nav-btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:var(--radius-sm); color:#fff; width:30px; height:30px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; transition:background .15s; }
  .nav-btn:hover { background:rgba(255,255,255,0.22); }
  .toolbar-wrap { background:var(--en-blue-light); border-bottom:1px solid var(--border); }
  .toolbar { max-width:1100px; margin:0 auto; padding:0.6rem 1.5rem; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .toolbar-label { font-size:11px; color:var(--text-muted); font-weight:500; margin-right:2px; }
  .filter-btn { background:transparent; border:1px solid var(--border); border-radius:20px; padding:3px 12px; font-size:11px; color:var(--text-muted); cursor:pointer; transition:all .15s; font-family:inherit; }
  .filter-btn:hover { border-color:var(--en-blue); color:var(--en-blue); }
  .filter-btn.active { background:var(--en-blue); border-color:var(--en-blue); color:#fff; font-weight:600; }
  .add-btn { margin-left:auto; background:var(--en-orange); color:#fff; border:none; border-radius:var(--radius-sm); padding:6px 16px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:background .15s; }
  .add-btn:hover { background:var(--en-orange-hover); }
  .main { max-width:1100px; margin:0 auto; padding:1.25rem 1.5rem 2rem; }
  .summary-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:1rem; }
  .summary-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:8px 14px; display:flex; flex-direction:column; align-items:center; min-width:78px; }
  .summary-num { font-size:20px; font-weight:700; color:var(--en-blue); line-height:1; }
  .summary-lbl { font-size:10px; color:var(--text-muted); margin-top:2px; text-align:center; }
  .summary-card.conflict .summary-num { color:var(--danger); }
  .conflict-alert { background:var(--danger-bg); border:1px solid var(--danger-border); border-radius:var(--radius-sm); padding:8px 14px; font-size:12px; color:#8B1A1A; margin-bottom:1rem; display:none; align-items:center; gap:8px; }
  .conflict-alert.show { display:flex; }
  .sync-status { display:flex; align-items:center; gap:8px; margin-bottom:0.75rem; font-size:11px; color:var(--text-muted); }
  .sync-dot { width:8px; height:8px; border-radius:50%; background:#ccc; flex-shrink:0; transition:background .3s; }
  .sync-dot.ok { background:#1D9E75; }
  .sync-dot.loading { background:var(--en-orange); animation:pulse .8s infinite; }
  .sync-dot.error { background:var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
  .sync-refresh { margin-left:auto; background:transparent; border:1px solid var(--border); border-radius:4px; padding:2px 8px; font-size:10px; cursor:pointer; font-family:inherit; color:var(--text-muted); }
  .sync-refresh:hover { border-color:var(--en-blue); color:var(--en-blue); }
  .calendar-wrap { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:0 2px 8px rgba(0,58,112,0.06); }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); }
  .day-header { background:var(--en-blue); color:rgba(255,255,255,0.9); font-size:11px; font-weight:600; text-align:center; padding:8px 4px; border-right:1px solid rgba(255,255,255,0.1); letter-spacing:0.5px; }
  .day-header:last-child { border-right:none; }
  .day-cell { min-height:90px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); padding:5px; position:relative; cursor:pointer; background:var(--card); transition:background .1s; }
  .day-cell:nth-child(7n) { border-right:none; }
  .day-cell:hover { background:var(--en-blue-light); }
  .day-cell.other-month { background:#f8fafc; }
  .day-cell.other-month .day-num { color:#b0bec5; }
  .day-cell.has-conflict { background:rgba(226,75,74,0.04); }
  .day-cell.today .day-num { background:var(--en-orange); color:#fff; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; font-weight:700; }
  .day-num { font-size:12px; font-weight:600; color:var(--text-muted); display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; margin-bottom:3px; }
  .conflict-badge { position:absolute; top:5px; right:5px; background:var(--danger); color:#fff; font-size:9px; font-weight:700; border-radius:8px; padding:1px 5px; }
  .event-pill { font-size:10px; padding:2px 6px; border-radius:10px; margin-bottom:2px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:4px; line-height:1.4; font-weight:500; transition:opacity .1s; }
  .event-pill:hover { opacity:0.8; }
  .pill-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .more-label { font-size:10px; color:var(--text-light); padding:0 3px; }
  .add-day-btn { position:absolute; bottom:4px; right:4px; width:18px; height:18px; border:1px solid var(--border); border-radius:50%; background:transparent; cursor:pointer; display:none; align-items:center; justify-content:center; font-size:14px; color:var(--text-muted); line-height:1; font-family:inherit; }
  .day-cell:hover .add-day-btn { display:flex; }
  .legend { background:var(--en-blue-light); border-top:1px solid var(--border); padding:8px 14px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text-muted); font-weight:500; }
  .legend-dot { width:10px; height:10px; border-radius:50%; }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,30,60,0.45); z-index:1000; align-items:center; justify-content:center; padding:1rem; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--card); border-radius:var(--radius); width:100%; max-width:390px; box-shadow:0 16px 48px rgba(0,30,60,0.22); overflow:hidden; }
  .modal-header { background:var(--en-blue); padding:1rem 1.25rem; display:flex; align-items:center; justify-content:space-between; }
  .modal-title { font-size:14px; font-weight:600; color:#fff; }
  .modal-close { background:transparent; border:none; color:rgba(255,255,255,0.7); font-size:22px; cursor:pointer; line-height:1; padding:0; font-family:inherit; }
  .modal-close:hover { color:#fff; }
  .modal-body { padding:1.25rem; }
  .form-group { margin-bottom:0.85rem; }
  .form-label { display:block; font-size:11px; font-weight:700; color:var(--text-muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px; }
  .form-control { width:100%; padding:8px 10px; font-size:13px; border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); background:#fff; font-family:inherit; transition:border-color .15s; }
  .form-control:focus { outline:none; border-color:var(--en-blue); box-shadow:0 0 0 3px rgba(0,58,112,0.1); }
  textarea.form-control { resize:vertical; min-height:60px; }
  .modal-footer { padding:0 1.25rem 1.25rem; display:flex; gap:8px; justify-content:flex-end; align-items:center; }
  .btn { border-radius:var(--radius-sm); padding:7px 18px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; }
  .btn-primary { background:var(--en-orange); color:#fff; border:none; }
  .btn-primary:hover { background:var(--en-orange-hover); }
  .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text-muted); }
  .btn-ghost:hover { border-color:var(--text-muted); color:var(--text); }
  .btn-danger { background:transparent; border:1px solid var(--danger); color:var(--danger); margin-right:auto; }
  .btn-danger:hover { background:var(--danger-bg); }
  .site-footer { text-align:center; padding:1rem; font-size:10px; color:var(--text-light); border-top:1px solid var(--border); margin-top:0.5rem; }
  .footer-bar { width:40px; height:3px; background:var(--en-orange); border-radius:2px; margin:0 auto 6px; }
  @media(max-width:680px){
    .header-inner{padding:0 1rem;} .header-nav{width:100%;justify-content:center;padding-top:0;padding-bottom:0.6rem;}
    .toolbar{padding:0.5rem 1rem;} .main{padding:0.75rem 1rem 2rem;}
    .day-cell{min-height:64px;} .event-pill{font-size:9px;}
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo-block">
      <div class="logo-expresso">Expresso</div>
      <div class="logo-nepomuceno">Nepomuceno</div>
      <div class="logo-bar"></div>
    </div>
    <div class="header-title-block">
      <div class="header-title">Agenda de Comunicados — DGP</div>
      <div class="header-sub">Programação compartilhada de postagens internas</div>
    </div>
    <div class="header-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
      <div class="month-label" id="month-label"></div>
      <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
    </div>
  </div>
</header>

<div class="toolbar-wrap">
  <div class="toolbar">
    <span class="toolbar-label">Ver:</span>
    <button class="filter-btn active" onclick="setFilter('all',this)">Todas</button>
    <button class="filter-btn" onclick="setFilter('Tamiris',this)">Tamiris</button>
    <button class="filter-btn" onclick="setFilter('Hérica',this)">Hérica</button>
    <button class="filter-btn" onclick="setFilter('Juliana',this)">Juliana</button>
    <button class="filter-btn" onclick="setFilter('Camila',this)">Camila</button>
    <button class="filter-btn" onclick="setFilter('Andréia',this)">Andréia</button>
    <button class="add-btn" onclick="openModal(null)">＋ Nova postagem</button>
  </div>
</div>

<main class="main">
  <div class="summary-bar" id="summary-bar"></div>
  <div class="conflict-alert" id="conflict-alert">⚠️ <span id="conflict-text"></span></div>
  <div class="sync-status">
    <div class="sync-dot loading" id="sync-dot"></div>
    <span id="sync-text">Conectando...</span>
    <button class="sync-refresh" onclick="forceSync()">↻ Atualizar</button>
  </div>
  <div class="calendar-wrap">
    <div class="cal-grid" id="calendar">
      <div class="day-header">Dom</div><div class="day-header">Seg</div>
      <div class="day-header">Ter</div><div class="day-header">Qua</div>
      <div class="day-header">Qui</div><div class="day-header">Sex</div>
      <div class="day-header">Sáb</div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#003A70"></div>Tamiris</div>
      <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>Hérica</div>
      <div class="legend-item"><div class="legend-dot" style="background:#F47920"></div>Juliana</div>
      <div class="legend-item"><div class="legend-dot" style="background:#BA7517"></div>Camila</div>
      <div class="legend-item"><div class="legend-dot" style="background:#D4537E"></div>Andréia</div>
      <div class="legend-item" style="margin-left:8px"><div class="legend-dot" style="background:#E24B4A;border-radius:3px"></div>Conflito de data</div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-bar"></div>
  Expresso Nepomuceno · Diretoria de Gestão de Pessoas
</footer>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Nova postagem</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Responsável</label>
        <select class="form-control" id="f-sup">
          <option>Tamiris</option><option>Hérica</option><option>Juliana</option>
          <option>Camila</option><option>Andréia</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Data</label>
        <input type="date" class="form-control" id="f-date">
      </div>
      <div class="form-group">
        <label class="form-label">Título do comunicado</label>
        <input type="text" class="form-control" id="f-title" placeholder="Ex: Atualização plano de saúde Hapvida">
      </div>
      <div class="form-group">
        <label class="form-label">Categoria</label>
        <select class="form-control" id="f-cat">
          <option>Benefícios</option>
          <option>Pessoas e Cultura</option>
          <option>Folha de Pagamento</option>
          <option>Remuneração</option>
          <option>Relações Sindicais</option>
          <option>Gestão de Talentos</option>
          <option>Outros</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Observação (opcional)</label>
        <textarea class="form-control" id="f-obs" placeholder="Canal, público-alvo, contexto..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="btn-del" style="display:none" onclick="deleteEvent()">Excluir</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEvent()">Salvar</button>
    </div>
  </div>
</div>

<script>
  const API_KEY  = '$2a$10$v0J5DZQLQSWZIColvg9RPuiWbfYcKAtJQVvRI9DZXwDF9Ztfx8LEC';
  const BIN_URL  = 'https://api.jsonbin.io/v3/b';
  const BIN_ID   = '6a28a418f5f4af5e29d50865';

  const COLORS = {
    Tamiris: {bg:'#E6EEF5',border:'#003A70',text:'#003A70',dot:'#003A70'},
    Hérica:  {bg:'#E1F5EE',border:'#1D9E75',text:'#0a5c3e',dot:'#1D9E75'},
    Juliana: {bg:'#FEF0E6',border:'#F47920',text:'#7a3500',dot:'#F47920'},
    Camila:  {bg:'#FAEEDA',border:'#BA7517',text:'#7a4800',dot:'#BA7517'},
    Andréia: {bg:'#FBEAF0',border:'#D4537E',text:'#72243E',dot:'#D4537E'}
  };

  let currentDate = new Date();
  let activeFilter = 'all';
  let editingId = null;
  let events = [];

  // ── JSONBIN ───────────────────────────────────────────────────
  async function initBin() {
    await syncFromBin();
  }

  async function syncFromBin() {
    if (!BIN_ID) return;
    setSyncStatus('loading', 'Sincronizando...');
    try {
      const r = await fetch(`${BIN_URL}/${BIN_ID}/latest`, {
        headers: { 'X-Master-Key': API_KEY }
      });
      const d = await r.json();
      events = (d.record.events || []).map(e => ({...e, id: String(e.id)}));
      render();
      const t = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      setSyncStatus('ok', 'Sincronizado às ' + t);
    } catch(e) { setSyncStatus('error', 'Erro ao sincronizar'); }
  }

  async function saveToBin() {
    if (!BIN_ID) return;
    setSyncStatus('loading', 'Salvando...');
    try {
      await fetch(`${BIN_URL}/${BIN_ID}`, {
        method: 'PUT',
        headers: { 'Content-Type':'application/json', 'X-Master-Key': API_KEY },
        body: JSON.stringify({ events })
      });
      const t = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      setSyncStatus('ok', 'Salvo às ' + t);
    } catch(e) { setSyncStatus('error', 'Erro ao salvar — tente novamente'); }
  }

  function forceSync() { syncFromBin(); }
  function setSyncStatus(s,m) {
    document.getElementById('sync-dot').className='sync-dot '+s;
    document.getElementById('sync-text').textContent=m;
  }

  // ── FILTRO / NAV ──────────────────────────────────────────────
  function setFilter(f,btn) {
    activeFilter=f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); render();
  }
  function changeMonth(dir) {
    currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+dir,1); render();
  }

  // ── RENDER ────────────────────────────────────────────────────
  function render() {
    const y=currentDate.getFullYear(), m=currentDate.getMonth();
    document.getElementById('month-label').textContent=
      new Date(y,m,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'}).replace(/^\w/,c=>c.toUpperCase());
    const cal=document.getElementById('calendar');
    Array.from(cal.children).slice(7).forEach(e=>e.remove());
    const firstDay=new Date(y,m,1).getDay(), daysInMonth=new Date(y,m+1,0).getDate(), today=new Date();
    const monthEvs=events.filter(e=>{const d=new Date(e.date+'T12:00');return d.getFullYear()===y&&d.getMonth()===m;});
    const byDay={};
    monthEvs.forEach(e=>{byDay[e.date]=byDay[e.date]||[];byDay[e.date].push(e);});
    const prevDays=new Date(y,m,0).getDate();
    for(let i=firstDay-1;i>=0;i--){const c=document.createElement('div');c.className='day-cell other-month';c.innerHTML=`<div class="day-num">${prevDays-i}</div>`;cal.appendChild(c);}
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayEvs=byDay[ds]||[], visEvs=activeFilter==='all'?dayEvs:dayEvs.filter(e=>e.sup===activeFilter);
      const sups=[...new Set(dayEvs.map(e=>e.sup))], conflict=sups.length>1;
      const isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
      const c=document.createElement('div');
      c.className='day-cell'+(isToday?' today':'')+(conflict?' has-conflict':'');
      c.onclick=()=>openModalOnDate(ds);
      let h=`<div class="day-num">${d}</div>`;
      if(conflict&&activeFilter==='all') h+=`<div class="conflict-badge">${sups.length}</div>`;
      visEvs.slice(0,3).forEach(ev=>{
        const col=COLORS[ev.sup]||COLORS.Tamiris;
        h+=`<div class="event-pill" style="background:${col.bg};color:${col.text};border:1px solid ${col.border}" onclick="event.stopPropagation();editEvent('${String(ev.id)}')" title="${ev.sup}: ${escHtml(ev.title)}"><span class="pill-dot" style="background:${col.dot}"></span>${escHtml(ev.title)}</div>`;
      });
      if(visEvs.length>3) h+=`<div class="more-label">+${visEvs.length-3} mais</div>`;
      h+=`<button class="add-day-btn" onclick="event.stopPropagation();openModalOnDate('${ds}')">+</button>`;
      c.innerHTML=h; cal.appendChild(c);
    }
    const total=firstDay+daysInMonth, rem=total<=35?35-total:42-total;
    for(let i=1;i<=rem;i++){const c=document.createElement('div');c.className='day-cell other-month';c.innerHTML=`<div class="day-num">${i}</div>`;cal.appendChild(c);}
    renderSummary(monthEvs,byDay);
  }

  function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  function renderSummary(monthEvs,byDay){
    const cd=Object.values(byDay).filter(v=>[...new Set(v.map(e=>e.sup))].length>1).length;
    const people=['Tamiris','Hérica','Juliana','Camila','Andréia'];
    document.getElementById('summary-bar').innerHTML=
      `<div class="summary-card"><div class="summary-num">${monthEvs.length}</div><div class="summary-lbl">postagens no mês</div></div>`+
      people.map(n=>`<div class="summary-card"><div class="summary-num" style="color:${COLORS[n].dot}">${monthEvs.filter(e=>e.sup===n).length}</div><div class="summary-lbl">${n}</div></div>`).join('')+
      `<div class="summary-card${cd>0?' conflict':''}"><div class="summary-num">${cd}</div><div class="summary-lbl">conflito${cd!==1?'s':''}</div></div>`;
    const alert=document.getElementById('conflict-alert');
    if(cd>0){alert.classList.add('show');document.getElementById('conflict-text').textContent=`${cd} dia(s) com postagens simultâneas — considere redistribuir as datas.`;}
    else alert.classList.remove('show');
  }

  // ── MODAL ─────────────────────────────────────────────────────
  function openModal(ds){
    editingId=null;
    document.getElementById('modal-title').textContent='Nova postagem';
    document.getElementById('f-sup').value='Tamiris';
    document.getElementById('f-date').value=ds||new Date().toISOString().slice(0,10);
    document.getElementById('f-title').value='';
    document.getElementById('f-cat').value='Benefícios';
    document.getElementById('f-obs').value='';
    document.getElementById('btn-del').style.display='none';
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(()=>document.getElementById('f-title').focus(),100);
  }
  function openModalOnDate(ds){openModal(ds);}
  function editEvent(id){
    const ev=events.find(e=>String(e.id)===String(id)); if(!ev) return;
    editingId=id;
    document.getElementById('modal-title').textContent='Editar postagem';
    document.getElementById('f-sup').value=ev.sup;
    document.getElementById('f-date').value=ev.date;
    document.getElementById('f-title').value=ev.title;
    document.getElementById('f-cat').value=ev.cat;
    document.getElementById('f-obs').value=ev.obs||'';
    document.getElementById('btn-del').style.display='block';
    document.getElementById('modal-overlay').classList.add('open');
  }
  function closeModal(){document.getElementById('modal-overlay').classList.remove('open');editingId=null;}
  document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

  async function saveEvent(){
    const sup=document.getElementById('f-sup').value;
    const date=document.getElementById('f-date').value;
    const title=document.getElementById('f-title').value.trim();
    const cat=document.getElementById('f-cat').value;
    const obs=document.getElementById('f-obs').value.trim();
    if(!title){document.getElementById('f-title').focus();return;}
    if(!date){document.getElementById('f-date').focus();return;}
    if(editingId){
      const i=events.findIndex(e=>String(e.id)===String(editingId));
      if(i>-1) events[i]={id:editingId,sup,date,title,cat,obs};
    } else {
      events.push({id:Date.now().toString(),sup,date,title,cat,obs});
    }
    closeModal(); render(); await saveToBin();
  }

  async function deleteEvent(){
    if(!confirm('Excluir esta postagem?')) return;
    events=events.filter(e=>String(e.id)!==String(editingId));
    closeModal(); render(); await saveToBin();
  }

  // ── INIT ──────────────────────────────────────────────────────
  render();
  initBin();
  setInterval(syncFromBin, 20000);
</script>
</body>
</html>
